name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install fastapi==0.104.1 uvicorn==0.24.0 sqlalchemy==2.0.23 \
            psycopg2-binary==2.9.9 alembic==1.12.1 \
            python-jose[cryptography]==3.3.0 bcrypt==4.1.2 \
            python-multipart==0.0.6 pydantic-settings==2.1.0 \
            pydantic[email]==2.5.2 email-validator==2.1.0 \
            pytest==7.4.3 httpx==0.25.2 \
            pandas==2.1.3 openpyxl==3.1.2 \
            python-docx==1.1.0 reportlab==4.0.7 \
            matplotlib==3.8.2

      - name: Run tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci-pipeline
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
        run: |
          pytest tests/ -v --tb=short

      - name: Tests summary
        if: always()
        run: echo "Tests completed"