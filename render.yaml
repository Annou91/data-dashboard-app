services:
  - type: web
    name: datadash-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install fastapi uvicorn sqlalchemy psycopg2-binary alembic python-jose bcrypt python-multipart pydantic-settings "pydantic[email]" email-validator pandas openpyxl python-docx reportlab matplotlib numpy
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: DATABASE_URL
        fromDatabase:
          name: datadash-db
          property: connectionString

databases:
  - name: datadash-db
    plan: free